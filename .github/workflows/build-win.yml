name: Build Windows EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install JS dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm run build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      # 正确可用v8.18.0 全量Windows包
      - name: Install libvips from official release
        shell: pwsh
        run: |
          $vipsVer = "8.18.0"
          $zipUrl = "https://github.com/libvips/libvips/releases/download/v$vipsVer/vips-dev-w64-all-$vipsVer.zip"
          $zipFile = Join-Path $env:RUNNER_TEMP vips.zip
          $dest = "C:\vips"
          
          Invoke-WebRequest -Uri $zipUrl -OutFile $zipFile -UseBasicParsing
          Expand-Archive $zipFile $dest -Force
          
          $binDir = Join-Path $dest "vips-dev-w64-all-$vipsVer\bin"
          echo $binDir | Out-File $env:GITHUB_PATH -Append
          
          # 补充pkg-config路径方便Rust编译
          $pkgPath = Join-Path $dest "vips-dev-w64-all-$vipsVer\lib\pkgconfig"
          echo "PKG_CONFIG_PATH=$pkgPath" | Out-File $env:GITHUB_ENV -Append

      - name: Verify vips install
        run: vips --version

      - name: Build Tauri Windows App
        run: pnpm tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-tauri-exe-package
          path: |
            target/release/*.exe
            target/release/*.msi
            target/release/*.zip
            target/release/*.nupkg
