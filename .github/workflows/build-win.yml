name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install JS deps
        run: npm install

      - name: Install libvips (prebuilt binary)
        shell: pwsh
        run: |
          $vipsver = "8.16.1"
          $url = "https://github.com/libvips/libvips/releases/download/v$vipsver/vips-dev-w64-all-$vipsver.zip"
          $zip = "$env:TEMP\vips.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:TEMP\vips" -Force
          echo "VIPS_INCLUDE_DIR=$env:TEMP\vips\vips-dev-$vipsver\include" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "$env:TEMP\vips\vips-dev-$vipsver\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build Tauri App
        run: npm run tauri build

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: LuminaConvert-Windows
          path: src-tauri/target/release/LuminaConvert.exe
          if-no-files-found: error
