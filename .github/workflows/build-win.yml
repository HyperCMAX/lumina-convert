name: Build Windows EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install JS dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm run build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      # 官方winget精准安装libvips，避免github release链接404
      - name: Install libvips via winget
        shell: pwsh
        run: |
          winget install --id libvips.libvips -e --force
          # 提取vips.exe所在目录加入PATH，让后续步骤能调用
          $vipsExe = Get-Command vips.exe -ErrorAction SilentlyContinue
          if ($vipsExe) {
            $binPath = Split-Path $vipsExe.Source
            echo $binPath | Out-File -FilePath $env:GITHUB_PATH -Append
            # 补充pkg-config路径适配Rust编译
            $libRoot = Split-Path $binPath -Parent
            $pkgPath = Join-Path $libRoot "lib\pkgconfig"
            echo "PKG_CONFIG_PATH=$pkgPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      # 校验安装是否成功
      - name: Verify vips installation
        run: vips --version

      - name: Build Tauri Windows App
        run: pnpm tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-tauri-exe-package
          path: |
            target/release/*.exe
            target/release/*.msi
            target/release/*.zip
            target/release/*.nupkg
