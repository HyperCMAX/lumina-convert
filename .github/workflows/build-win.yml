name: Build Windows EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install JS dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm run build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      # 用 choco 直接装 libvips，不用绕 vcpkg
      - name: Install libvips via Chocolatey
        run: |
          choco install libvips -y
          # 把 vips 二进制目录加入PATH，让后续进程能找到
          echo "C:\ProgramData\chocolatey\lib\libvips\tools\vips-dev-w64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Verify vips install
        run: vips --version

      - name: Build Tauri Windows App
        run: pnpm tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-tauri-exe-package
          path: |
            target/release/*.exe
            target/release/*.msi
            target/release/*.zip
            target/release/*.nupkg
