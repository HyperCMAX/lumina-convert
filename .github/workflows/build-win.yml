name: Build Windows EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install JS dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm run build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      # 从libvips官方Release拉取预编译Windows二进制包、解压并注入PATH
      - name: Install libvips from official release binary
        shell: pwsh
        run: |
          # 选定版本，可替换为最新版
          $vipsVersion = "8.18.0"
          $zipUrl = "https://github.com/libvips/libvips/releases/download/v$vipsVersion/vips-dev-w64-all-$vipsVersion.zip"
          $zipPath = Join-Path $env:RUNNER_TEMP vips.zip
          $installRoot = "C:\vips"
          
          # 下载压缩包
          Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath -UseBasicParsing
          # 解压到目标目录
          Expand-Archive -Path $zipPath -DestinationPath $installRoot -Force
          # 拼接bin目录路径
          $vipsBinPath = Join-Path $installRoot "vips-dev-w64-all-$vipsVersion\bin"
          # 写入GITHUB_PATH，后续步骤可调用vips.exe、加载dll
          echo $vipsBinPath | Out-File -FilePath $env:GITHUB_PATH -Append
          
          # 可选：设置pkg-config路径，方便Rust编译时找到头文件/库
          $env:PKG_CONFIG_PATH = Join-Path $installRoot "vips-dev-w64-all-$vipsVersion\lib\pkgconfig"
          echo "PKG_CONFIG_PATH=$env:PKG_CONFIG_PATH" | Out-File -FilePath $env:GITHUB_ENV -Append

      # 校验安装是否成功
      - name: Verify vips installation
        run: vips --version

      - name: Build Tauri Windows App
        run: pnpm tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-tauri-exe-package
          path: |
            target/release/*.exe
            target/release/*.msi
            target/release/*.zip
            target/release/*.nupkg
