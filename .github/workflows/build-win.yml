name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        shell: pwsh
        run: npm install -g pnpm

      - name: Install JS deps
        run: pnpm install

      - name: Install libvips via vcpkg
        shell: pwsh
        run: |
          vcpkg install libvips --triplet x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Verify vips headers
        shell: pwsh
        run: |
          $vcpkg = $env:VCPKG_INSTALLATION_ROOT
          $inc = "$vcpkg\installed\x64-windows\include"
          Write-Host "Include dir: $inc"
          if (Test-Path "$inc\vips\vips.h") {
            Write-Host "vips/vips.h found!" -ForegroundColor Green
          } else {
            Write-Host "vips/vips.h NOT found at $inc" -ForegroundColor Red
            Get-ChildItem $inc -Recurse -Filter "vips.h" | Select-Object -First 5
          }

      - name: Build Tauri App
        run: pnpm tauri build

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: LuminaConvert-Windows
          path: src-tauri/target/release/LuminaConvert.exe
          if-no-files-found: error
