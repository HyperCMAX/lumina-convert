name: Build Windows EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install JS dependencies via npm
        run: npm install

      - name: Build frontend
        run: npm run build

      # 指定安装 GNU 编译目标
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install libvips official prebuilt binary
        shell: pwsh
        run: |
          $vipsVer = "8.18.2"
          $zipUrl = "https://github.com/libvips/build-win64-mxe/releases/download/v$vipsVer/vips-dev-x64-all-$vipsVer.zip"
          $zipFile = Join-Path $env:RUNNER_TEMP vips.zip
          $installRoot = "C:\vips"

          curl -L -o "$zipFile" "$zipUrl"
          Expand-Archive -Path $zipFile -DestinationPath $installRoot -Force

          $vipsExe = Get-ChildItem -Path $installRoot -Filter vips.exe -Recurse | Select-Object -First 1
          if (-not $vipsExe) {
            Write-Error "vips.exe not found"
            exit 1
          }
          $binPath = $vipsExe.DirectoryName
          $binPath | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

          $pkgConfig = Get-ChildItem -Path $installRoot -Filter pkgconfig -Recurse -Directory | Select-Object -First 1
          if ($pkgConfig) {
            echo "PKG_CONFIG_PATH=$($pkgConfig.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      - name: Verify vips installation
        run: vips --version

      # 用 GNU 目标构建，匹配预生成绑定的 ABI
      - name: Build Tauri Windows App
        run: npx tauri build --target x86_64-pc-windows-gnu

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-tauri-exe-package
          path: |
            target/x86_64-pc-windows-gnu/release/*.exe
            target/x86_64-pc-windows-gnu/release/*.msi
            target/x86_64-pc-windows-gnu/release/*.zip
