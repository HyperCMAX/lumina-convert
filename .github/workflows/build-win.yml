name: Build Windows EXE (npm stable, binary libvips)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install JS dependencies via npm
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      # 静默解压官方二进制包，无交互、无需商店协议确认
      - name: Install libvips via official binary (ghproxy mirror)
        shell: pwsh
        run: |
          $vipsVer = "8.18.2"
          $zipUrl = "https://ghproxy.com/https://github.com/libvips/libvips/releases/download/v$vipsVer/vips-dev-w64-all-$vipsVer.zip"
          $zipFile = Join-Path $env:RUNNER_TEMP vips.zip
          $installDir = "C:\vips"

          Invoke-WebRequest -Uri $zipUrl -OutFile $zipFile -UseBasicParsing
          Expand-Archive -Path $zipFile -DestinationPath $installDir -Force

          $binPath = Join-Path $installDir "vips-dev-w64-all-$vipsVer\bin"
          echo $binPath | Out-File -FilePath $env:GITHUB_PATH -Append

          $pkgConfigPath = Join-Path $installDir "vips-dev-w64-all-$vipsVer\lib\pkgconfig"
          echo "PKG_CONFIG_PATH=$pkgConfigPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Verify vips install
        run: vips --version

      - name: Build Tauri Windows App
        run: npx tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-tauri-exe-package
          path: |
            target/release/*.exe
            target/release/*.msi
            target/release/*.zip
            target/release/*.nupkg
