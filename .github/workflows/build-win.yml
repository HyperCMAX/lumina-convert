name: Build Windows EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install JS dependencies via npm
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # 修复：指定Rust工程在src-tauri目录，解决找不到Cargo.toml
      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # 修复：官方直连地址 + curl稳定下载，去掉代理
      - name: Install libvips official prebuilt binary
        shell: pwsh
        run: |
          $vipsVer = "8.18.2"
          $zipUrl = "https://github.com/libvips/build-win64-mxe/releases/download/v$vipsVer/vips-dev-x64-all-$vipsVer.zip"
          $zipFile = Join-Path $env:RUNNER_TEMP vips.zip
          $installDir = "C:\vips"

          curl -L -o "$zipFile" "$zipUrl"
          Expand-Archive -Path $zipFile -DestinationPath $installDir -Force

          $binPath = Join-Path $installDir "vips-dev-x64-all-$vipsVer\bin"
          echo $binPath | Out-File -FilePath $env:GITHUB_PATH -Append

          $pkgConfigPath = Join-Path $installDir "vips-dev-x64-all-$vipsVer\lib\pkgconfig"
          echo "PKG_CONFIG_PATH=$pkgConfigPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Verify vips installation
        run: vips --version

      - name: Build Tauri Windows App
        run: npx tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-tauri-exe-package
          path: |
            target/release/*.exe
            target/release/*.msi
            target/release/*.zip
            target/release/*.nupkg
