name: Build Windows EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install JS dependencies via npm
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # 自动定位vips路径，杜绝硬编码目录名错误
      - name: Install libvips official prebuilt binary
        shell: pwsh
        run: |
          $vipsVer = "8.18.2"
          $zipUrl = "https://github.com/libvips/build-win64-mxe/releases/download/v$vipsVer/vips-dev-x64-all-$vipsVer.zip"
          $zipFile = Join-Path $env:RUNNER_TEMP vips.zip
          $installRoot = "C:\vips"

          # 下载压缩包
          curl -L -o "$zipFile" "$zipUrl"
          # 解压
          Expand-Archive -Path $zipFile -DestinationPath $installRoot -Force

          # 自动查找vips.exe所在的bin目录，避免硬编码目录名出错
          $vipsExe = Get-ChildItem -Path $installRoot -Filter vips.exe -Recurse | Select-Object -First 1
          if (-not $vipsExe) {
            Write-Error "vips.exe not found in extracted files"
            exit 1
          }
          $binPath = $vipsExe.DirectoryName
          Write-Host "Found vips.exe at: $binPath"

          # 写入PATH，确保后续步骤生效
          $binPath | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

          # 自动查找pkgconfig目录
          $pkgConfig = Get-ChildItem -Path $installRoot -Filter pkgconfig -Recurse -Directory | Select-Object -First 1
          if ($pkgConfig) {
            echo "PKG_CONFIG_PATH=$($pkgConfig.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      - name: Verify vips installation
        run: vips --version

      - name: Build Tauri Windows App
        run: npx tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-tauri-exe-package
          path: |
            target/release/*.exe
            target/release/*.msi
            target/release/*.zip
            target/release/*.nupkg
