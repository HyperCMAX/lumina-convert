name: Build Windows EXE (npm stable, libvips binary install)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install JS dependencies via npm
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      # 用ghproxy加速官方二进制包，静默部署，避开winget交互协议弹窗
      - name: Install libvips from mirrored official binary
        shell: pwsh
        run: |
          $vipsVer = "8.18.2"
          $zipUrl = "https://ghproxy.com/https://github.com/libvips/libvips/releases/download/v$vipsVer/vips-dev-w64-all-$vipsVer.zip"
          $zipFile = Join-Path $env:RUNNER_TEMP vips.zip
          $dest = "C:\vips"

          Invoke-WebRequest -Uri $zipUrl -OutFile $zipFile -UseBasicParsing
          Expand-Archive -Path $zipFile -DestinationPath $dest -Force

          $binDir = Join-Path $dest "vips-dev-w64-all-$vipsVer\bin"
          echo $binDir | Out-File -FilePath $env:GITHUB_PATH -Append

          $pkgPath = Join-Path $dest "vips-dev-w64-all-$vipsVer\lib\pkgconfig"
          echo "PKG_CONFIG_PATH=$pkgPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Verify vips installation
        run: vips --version

      - name: Build Tauri Windows App
        run: npx tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-tauri-exe-package
          path: |
            target/release/*.exe
            target/release/*.msi
            target/release/*.zip
            target/release/*.nupkg
