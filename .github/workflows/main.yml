name: Build Windows EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install JS dependencies via npm
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      - name: Install libvips official prebuilt binary
        shell: pwsh
        run: |
          $vipsVer = "8.18.2"
          $dirVer = "8.18"
          $zipUrl = "https://github.com/libvips/build-win64-mxe/releases/download/v$vipsVer/vips-dev-x64-all-$vipsVer.zip"
          $zipFile = Join-Path $env:RUNNER_TEMP vips.zip
          $installDir = "C:\vips"

          curl -L -o $zipFile $zipUrl
          Expand-Archive -Path $zipFile -DestinationPath $installDir -Force

          $prefix = Join-Path $installDir "vips-dev-$dirVer"
          $binPath = Join-Path $prefix "bin"
          echo $binPath | Out-File -FilePath $env:GITHUB_PATH -Append

          echo "PKG_CONFIG_PATH=$prefix\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "VIPS_INCLUDE_DIR=$prefix\include" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "VIPS_LIB_DIR=$prefix\lib" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Verify vips installation
        run: vips --version

      # 🚨 核心魔法：原封不动保留目录结构，注入全量 vips (突破 Windows 专利壁垒)
      - name: Inject Full vips Bundle with Directory Structure
        shell: pwsh
        run: |
          Write-Host "Copying entire vips directory preserving structure..."
          New-Item -ItemType Directory -Force -Path "src-tauri/resources"
          Copy-Item -Path "C:\vips\vips-dev-8.18" -Destination "src-tauri/resources\vips" -Recurse -Force -Verbose
          Write-Host "vips directory bundled at src-tauri/resources/vips/"
          Get-ChildItem "src-tauri/resources/vips/lib" -Recurse -Filter "*.dll" | ForEach-Object { Write-Host "  module: $($_.FullName)" }

      - name: Build Tauri Windows App
        run: npx tauri build

      - name: Copy vips directory alongside EXE for portable standalone use
        shell: pwsh
        run: |
          Write-Host "Copying vips directory structure alongside EXE for portable mode..."
          Copy-Item -Path "src-tauri/resources/vips" -Destination "src-tauri/target/release/vips" -Recurse -Force -Verbose
          Write-Host "vips deployed alongside EXE at src-tauri/target/release/vips/"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-tauri-exe-package
          path: |
            src-tauri/target/release/*.exe
            src-tauri/target/release/vips/**/*
