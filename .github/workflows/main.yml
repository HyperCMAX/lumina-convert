name: Build Windows EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1（Ubuntu）: 构建 libvips（含 HEVC），缓存到 Ubuntu 本地
  # ============================================================
  build-vips:
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache-vips.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4

      # Ubuntu 原生 cache（不跨 OS，稳定）
      - name: Restore cached HEVC libvips
        id: cache-vips
        uses: actions/cache@v4
        with:
          path: /tmp/vips-extracted/vips-dev-8.18
          key: libvips-hevc-build-v4-8.18.3

      - name: Build libvips with --with-hevc
        if: steps.cache-vips.outputs.cache-hit != 'true'
        run: |
          set -e
          git clone https://github.com/libvips/build-win64-mxe.git
          cd build-win64-mxe
          ./build.sh --with-hevc --target x86_64-w64-mingw32.shared vips-web
          mkdir -p /tmp/vips-extracted
          ls -lh packaging/*.zip
          find packaging -name "vips-dev-*.zip" -exec unzip -o {} -d /tmp/vips-extracted/ \;
          echo "=== Extracted ==="
          ls -lh /tmp/vips-extracted/

      # 用 artifact 传给 Job 2（Windows），绕过跨 OS cache 的坑
      - name: Upload vips artifact for Windows build
        uses: actions/upload-artifact@v4
        with:
          name: vips-hevc-x64
          path: /tmp/vips-extracted/vips-dev-8.18
          retention-days: 1

  # ============================================================
  # Job 2（Windows）: 使用 Job 1 产出的 libvips 构建 EXE
  # ============================================================
  build-exe:
    runs-on: windows-latest
    needs: build-vips
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install JS dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      # 从 Job 1 下载 HEVC libvips（始终成功，因为 needs: build-vips）
      - name: Download HEVC libvips from build-vips job
        uses: actions/download-artifact@v4
        with:
          name: vips-hevc-x64
          path: C:\vips\vips-dev-8.18

      - name: Set vips environment variables
        shell: pwsh
        run: |
          $prefix = "C:\vips\vips-dev-8.18"
          $binPath = Join-Path $prefix "bin"
          echo $binPath | Out-File -FilePath $env:GITHUB_PATH -Append
          echo "PKG_CONFIG_PATH=$prefix\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "VIPS_INCLUDE_DIR=$prefix\include" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "VIPS_LIB_DIR=$prefix\lib" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "VIPS_MODULE_DIR=$prefix\bin\vips-modules-8.18" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Verify vips installation
        run: vips --version

      - name: Inject Full vips Bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/resources"
          Copy-Item -Path "C:\vips\vips-dev-8.18" -Destination "src-tauri/resources\vips" -Recurse -Force -Verbose
          Get-ChildItem "src-tauri/resources/vips/bin" -Recurse -Filter "*.dll" | ForEach-Object { Write-Host "  dll: $($_.Name)" }

      - name: Build Tauri Windows App
        run: npx tauri build

      - name: Copy vips directory alongside EXE for portable use
        shell: pwsh
        run: |
          Copy-Item -Path "src-tauri/resources/vips" -Destination "src-tauri/target/release/vips" -Recurse -Force -Verbose

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-tauri-exe-package
          path: |
            src-tauri/target/release/*.exe
            src-tauri/target/release/vips/**/*
