name: Build Windows EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true # 放行Node20
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # 先设置Node，再加放行变量，去掉提前pnpm缓存
      - name: Setup Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 正常安装pnpm，放在node之后
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # 放行esbuild，安装依赖
      - name: Install JS dependencies
        run: pnpm install --allow-build=esbuild

      - name: Build frontend
        run: pnpm run build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      - name: Install libvips via vcpkg
        run: |
          choco install vcpkg
          vcpkg install libvips:x64-windows

      - name: Build Tauri Windows App
        run: pnpm tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-build
          path: |
            target/release/*.exe
            target/release/*.msi
            target/release/*.zip
